{% extends 'layouts/default.html'%} {% block content%}
<div class="mx-auto p-4">
  <h1 class="text-3xl font-bold mb-6">商品列表</h1>
  <div class="grid grid-cols-3 gap-6">
    {% for product in products %}
    <a href="{% url 'products:product_detail' product.id %}" class="block">
      <div
        class="bg-white rounded-lg overflow-hidden duration-300"
      >
        {% if product.images.first %}
        <img
          src="{{ product.images.first.url }}"
          alt="{{ product.name }}"
          class="w-full h-40 object-cover"
        />
        {% else %}
        <div
          class="w-full h-40 bg-gray-200 flex items-center justify-center tertiary-color-500"
        >
          No image
        </div>
        {% endif %}
        <div class="p-3">
          <h2 class="text-xl font-semibold mb-2">{{ product.name }}</h2>
          <p class="tertiary-color-500">價格: ${{ product.price }}</p>
        </div>
      </div>
    </a>
    {% empty %}
    <p class="col-span-full text-center tertiary-color-500">沒有找到任何商品。</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
