{% extends 'layouts/default.html' %} 
{% block content %}
<div class="container mx-auto p-4">
  <h1 class="text-3xl font-bold mb-4">{{ product.name }}</h1>
  <div
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-6"
  >
    {% for image in product.images.all %}
    <img
      src="{{ image.url }}"
      alt="{{ product.name }} Image"
      class="w-full h-64 object-cover rounded-lg shadow-md"
    />
    {% endfor %}
  </div>
  <p class="text-xl mb-2"><strong>價格:</strong> ${{ product.price }}</p>
  <p class="text-gray-700 mb-4">
    <strong>描述:</strong> {{ product.description }}
  </p>
  <p class="text-lg"><strong>團購狀態:</strong> {{ product.group.status }}</p>


  <div class="mt-6">
    <a
      href="{% url 'products:index' %}"
      class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
    >
      返回商品列表
    </a>
  </div>
</div>
{% endblock %}
