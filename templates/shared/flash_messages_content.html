<div id="flash-messages-container" x-data="messagesControl" x-init="showAllFrom($refs.msgsJson)" class="hidden">
   <!-- 測試 -->
   <script type="application/json" x-ref="msgsJson">
   [
         {% for message in messages %}
            {"text":"{{ message|escapejs }}","tag":"{{ message.tags|escapejs }}"} {% if not forloop.last %},{% endif %}
         {% endfor %}
   ]
   </script>
</div>
