{% load static %}
<div x-cloak
    x-data="{ modalShow: {{ verify_email_modal.modalShow|yesno:'true,false'|default:'false' }} }"
    x-show="modalShow"
    class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 text-center">
    <div class="bg-white p-10 rounded-2xl w-[60%] md:w-[40%] lg:w-[30%] relative">

        {% if verify_email_modal.img %}
            <div class="m-auto w-30 sm:w-40 aspect-square text-center">
                <img src="{% static verify_email_modal.img %}" alt="寄送驗證信結果圖片" class="object-contain">
            </div>
        {% endif %}
       
        {% if verify_email_modal.title %}
            <p class="text-md m:text-xl font-bold mb-2">
                {{ verify_email_modal.title }}
            </p>
        {% endif %}

        {% if verify_email_modal.content %}
            <p class="text-sm sm:text-base">
                {{ verify_email_modal.content }}
            </p>
        {% endif %}


        <button class="absolute top-6 right-6 cursor-pointer 
        hover:outline hover:outline-[1.5px] hover:outline-offset-8 rounded-full transition-all"
        @click="modalShow = false ">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#000000" viewBox="0 0 256 256"><path d="M208.49,191.51a12,12,0,0,1-17,17L128,145,64.49,208.49a12,12,0,0,1-17-17L111,128,47.51,64.49a12,12,0,0,1,17-17L128,111l63.51-63.52a12,12,0,0,1,17,17L145,128Z"></path></svg>
        </button>
    </div>
</div>
