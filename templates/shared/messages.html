{% if messages %}
<div x-data="messagesControl" x-init="showAllFrom($refs.msgsJson)">
    <script type="application/json" x-ref="msgsJson">
    [
        {% for message in messages %}
            {"text":"{{ message|escapejs }}","tag":"{{ message.tags|escapejs }}"} {% if not forloop.last %},{% endif %}
        {% endfor %}
    ]
    </script>
</div>
{% endif %}
