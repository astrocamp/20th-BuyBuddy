<nav id="tab-group-container" class="flex justify-center mt-6 lg:mt-8 w-full">
	<ul class="flex flex-nowrap items-center gap-2 sm:gap-3 lg:gap-4 px-3 sm:px-4 py-2 bg-[var(--tertiary-color)] rounded-full text-xs sm:text-sm lg:text-base">
		<li>
			<a href="{% url 'groups:index_filtered' filter_type='owned' %}"
				{% if request.htmx %}
			hx-get="{% url 'groups:index_filtered' filter_type='owned' %}"
			hx-target="#groups-container"
			hx-push-url="true"
			{% endif %}
			class="transition-all duration-300 px-4 sm:px-6 py-2 rounded-[50px] text-sm min-w-[88px] inline-block {% if active_tab == 'owned' %} bg-secondary-color text-white{% else %}bg-[var(--tertiary-color)] hover:bg-[var(--tertiary-color-200)]{% endif %}">
			我開的團
			</a>

		<li>
			<a href="{% url 'groups:index_filtered' filter_type='ongoing' %}"

			hx-push-url="true"
			{% endif %}
			class="transition-all duration-300 px-4 sm:px-6 py-2 rounded-[50px] text-sm min-w-[102px] inline-block  {% if not active_tab or active_tab == 'ongoing' %}bg-secondary-color text-white {% else %}bg-[var(--tertiary-color)] hover:bg-[var(--tertiary-color-200)]{% endif %}">
			現正開團中
			</a>
		</li>

			hx-push-url="true"
			{% endif %}
			class="transition-all duration-300 px-4 sm:px-6 py-2 rounded-[50px] text-sm min-w-[88px] inline-block {% if active_tab == 'followed' %} bg-secondary-color text-white{% else %}bg-[var(--tertiary-color)] hover:bg-[var(--tertiary-color-200)]{% endif %}">
