{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'styles/style.css' %}">
    <script type="module" src="{% static 'scripts/app.js' %}"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
	{% block extra_head %}
    {% endblock %}
</head>
<body class="min-h-screen flex flex-col" hx-headers='{"X-CSRFToken": "{{csrf_token}}"}' x-data="{ loading: false }">
    <header 
        class="w-full bg-white fixed z-40 transition-all duration-500 ease-in-out">
        {% include "shared/navbar.html" %}
    </header>

    {% include "shared/messages.html" %}
    <main class="pt-[90px] flex-1">
        {% block content %}
        {% endblock %}
    </main>
    
    {% include "shared/footer.html" %}

    {% include "shared/back_to_top_btn.html" %}

    {% include "shared/loading.html" %}
</body>
</html>
