version: '3.8'

services:
  web:
    build: .
    command: gunicorn  --bind 0.0.0.0:8000 --workers 2 --timeout 300 --max-requests 1000 --max-requests-jitter 50 BuyBuddy.wsgi:application  --access-logfile - --error-logfile - --log-level debug
    shm_size: '2g'
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      - rabbitmq
      - redis
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media 
    depends_on:
      - web

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  celery:
    build: .
    command: celery -A BuyBuddy worker -l info
    shm_size: '2g' 
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
    env_file:
      - .env

  celery-beat:
    build: .
    command: celery -A BuyBuddy beat -l info
    shm_size: '2g' 
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
    env_file:
      - .env

  redis:
    image: "redis:alpine"
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

volumes:
  static_volume:
  media_volume: {}
