version: '3.8'

services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 BuyBuddy.wsgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      - rabbitmq
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
    depends_on:
      - web

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  celery:
    build: .
    command: celery -A BuyBuddy worker -l info
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
    env_file:
      - .env

  celery-beat:
    build: .
    command: celery -A BuyBuddy beat -l info
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
    env_file:
      - .env