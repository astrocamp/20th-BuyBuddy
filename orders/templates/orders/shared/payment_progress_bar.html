<div class="w-[50%] xl:w-[30%] mx-auto mb-12">
    <div class="flex items-center justify-between sm:justify-between justify-center relative">
        <!-- 連接線底層 (sm以下隱藏) -->
        <div class="absolute left-[20px] right-[20px] top-1/3 -translate-y-1/2 h-[1.5px] bg-[var(--tertiary-color-300)] hidden sm:block"></div>

        <!-- 連接線填充層 (sm以下隱藏) -->
        {% if current_step == 2 %}
        <!-- step 2: 動畫填充到一半 -->
        <div class="absolute left-[20px] w-[calc(50%-20px)] top-1/3 -translate-y-1/2 h-[1.5px] bg-secondary-color progress-line-half hidden sm:block"></div>
        {% endif %}

        <!-- 步驟1 -->
        <div class="flex flex-col items-center z-10 {% if current_step != 1 %}hidden sm:flex{% endif %}">
            {% if current_step == 1 %}
                <div class="w-10 h-10 flex items-center justify-center bg-secondary-color text-white font-bold rounded-full mb-2">   
            {% else %}
                <div class="w-10 h-10 flex items-center justify-center tertiary-color-300 bg-[var(--bg-color)] border-2 border-[var(--tertiary-color-300)] text-white font-bold rounded-full mb-2">
            {% endif %}
                1
            </div>
            <p class="text-sm {% if current_step == 1 %}secondary-color{% else %}tertiary-color-300{% endif %}">選擇地址</p>
        </div>

        <!-- 步驟2 -->
        <div class="flex flex-col items-center z-10 {% if current_step != 2 %}hidden sm:flex{% endif %}">
            {% if current_step == 2 %}
                <div class="w-10 h-10 flex items-center justify-center bg-secondary-color text-white font-bold rounded-full mb-2">   
            {% else %}
                <div class="w-10 h-10 flex items-center justify-center tertiary-color-300 bg-[var(--bg-color)] border-2 border-[var(--tertiary-color-300)] text-white font-bold rounded-full mb-2">
            {% endif %}
                2
            </div>
            <p class="text-sm {% if current_step == 2 %}secondary-color{% else %}tertiary-color-300{% endif %}">確認訂單資訊</p>
        </div>

        <!-- 步驟3 -->
        <div class="flex flex-col items-center z-10 {% if current_step != 3 %}hidden sm:flex{% endif %}">
            {% if current_step == 3 %}
                <div class="w-10 h-10 flex items-center justify-center bg-secondary-color text-white font-bold rounded-full mb-2">   
            {% else %}
                <div class="w-10 h-10 flex items-center justify-center tertiary-color-300 bg-[var(--bg-color)] border-2 border-[var(--tertiary-color-300)] text-white font-bold rounded-full mb-2">
            {% endif %}
                3
            </div>
            <p class="text-sm {% if current_step == 3 %}secondary-color{% else %}tertiary-color-300{% endif %}">付款</p>
        </div>
    </div>
</div>
