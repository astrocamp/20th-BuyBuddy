<div class="flex flex-col items-center z-10 {% if current_step != step %}hidden sm:flex{% endif %}">
    {% if current_step == step %}
        <div class="w-10 h-10 flex items-center justify-center bg-secondary-color text-white font-bold rounded-full mb-2">   
    {% else %}
        <div class="w-10 h-10 flex items-center justify-center tertiary-color-300 bg-white border-2 border-[var(--tertiary-color-300)] text-white font-bold rounded-full mb-2">
    {% endif %}
        {{step}}
    </div>
    <p class="text-sm {% if current_step == step %}secondary-color{% else %}tertiary-color-300{% endif %}">
        {{content}}
    </p>
</div>
