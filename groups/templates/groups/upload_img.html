{% extends 'layouts/default.html'%}
{% load static%}
{% block content %}
<h2 class="text-center text-2xl font-bold mb-5">Create Data</h2>
<div class="flex flex-col items-center gap-2">
  <form
    class="flex justify-center gap-2 mb-5"
    action="{% url 'groups:create_img'%}"
    method="post"
    enctype="multipart/form-data"
  >
    {% csrf_token %}
    <input
      type="file"
      class="border-2 border-gray-300 rounded-md p-2"
      placeholder="上傳圖片"
      name="image"
      
    />
    <button class="bg-blue-500 text-white px-4 py-2 rounded-md">上傳</button>
  </form>
  <div>
    {% for photo in photos %}
    <div class="w-1/2">
      <img class="object-cover" src="{{ photo.banner.url }}" alt="Uploaded image">
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
