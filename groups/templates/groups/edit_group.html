{% extends 'layouts/default.html' %}

{% block content %}
<div x-data="validators">
  <h1 class="text-2xl font-bold text-center">座標位置：groups / edit_group</h1>
  <form method="POST" enctype="multipart/form-data" action="{% url 'groups:edit_group' group.id %}">
    {% csrf_token %}
    {{ group_form.as_div }}
    <button class="border-1" type="submit">更新</button>
    <a class="border" href="{% url 'products:product_create' group.id %}">新增產品</a>
  </form>
</div>

{% endblock %}
