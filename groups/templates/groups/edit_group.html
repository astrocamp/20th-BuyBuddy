{% extends 'layouts/default.html' %}

{% block content %}
<div x-data="validators">
  <h1 class="text-2xl font-bold text-center">座標位置：groups / edit_group</h1>
  <form class="flex flex-col gap-4 items-center" method="POST" enctype="multipart/form-data" action="{% url 'groups:edit_group' group.id %}">
    {% csrf_token %}
    <div class="flex gap-4 justify-center">
      <div>
        {{ group_form.as_div }}
      </div>
      <div>
        {{ product_form.as_div }}
        {{ productImage_form.as_div }}
      </div>
    </div>
    <button class="bg-blue-500 text-white px-4 py-2 rounded-md" type="submit">更新團購</button>
  </form>
</div>

{% endblock %}
