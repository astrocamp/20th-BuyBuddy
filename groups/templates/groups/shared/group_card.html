{% load static %}
<!-- Card  -->
<div class="relative">
    <!-- Image -->
    <div class="absolute w-full h-40 sm:h-44 lg:h-48 z-10">
        <img class="object-cover h-full w-full rounded-t-lg" src="{{group.banner.url}}" alt="團購圖片">
    </div>
    <!-- Card Body -->
    <div class="h-[420px] sm:h-[450px] lg:h-[480px] border-2 border-tertiary-color rounded-lg flex flex-col pt-40 sm:pt-44 lg:pt-48">
        <!-- Card Content -->
        <div class="flex-1 flex flex-col justify-between p-4 sm:p-6 lg:p-8">
            <div>
                <h3 class="text-xl lg:text-lg font-semibold line-clamp-2">{{ group.name }}</h3>
                <p class="tertiary-color-500 text-sm mt-2 line-clamp-2">{{ group.description|striptags }}</p>
            </div>
            
            <div class="flex flex-col gap-4">
                <!-- Progress bar -->
                <div>
                    <!-- 進度條容器 -->
                    <div class="w-full bg-tertiary-color rounded-full h-2 relative">
                        <div class="bg-primary-color h-full rounded-full" style="width: {{ group.current_progress }}%;"></div>
                        
                        <!-- 百分比 -->
                        {% with progress=group.current_progress %}
                            <span class="primary-color font-medium text-xl absolute -top-[32px] transform -translate-x-1/2"
                                    style="left: {% if progress < 10 %}5%{% elif progress > 85 %}93%{% else %}{{ progress }}%{% endif %};">
                                {{ progress }}%
                            </span>
                        {% endwith %}
                    </div>
                    <div class="text-sm secondary-color mt-2">
                        <span>{{ group.deadline|date:"Y-m-d H:i" }} 截止</span>
                    </div>
                </div>
                <div>
                    <a href="{% url 'groups:detail' group.id %}" class="block w-full rounded-[50px] secondary-btn py-2 text-xs text-center  sm:text-sm">
                        查看詳情
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
