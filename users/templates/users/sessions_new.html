{% extends 'layouts/default.html'%}

{% block content%}
<h1>登入</h1>
<form action="{% url 'users:sessions_create' %}" method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.GET.next }}">
    <div>
        <label>信箱:</label>
        <input type="text" placeholder="請輸入email" name="email" required class="outline">
    </div>
    <div>
        <label>密碼：</label>
        <input type="password" placeholder="請輸入password" name="password" required class="outline">
    </div>
    <div>
        <input type="checkbox" id="remember" class="cursor-pointer">
        <label for="remember" class="cursor-pointer">記住我</label>
    </div>
    <button class="outline cursor-pointer">登入</button>
</form>
{% endblock %}
