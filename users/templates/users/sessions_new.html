{% extends 'layouts/default.html'%}

{% block content%}
<div class="flex flex-col items-center">
    <div class="w-full max-w-md px-14">
        <h1 class="text-xl lg:text-lg font-bold mt-5 mb-4 text-center">登入</h1>
        <form action="{% url 'users:sessions_create' %}" method="post" class="flex flex-col gap-4 sm:gap-6" novalidate>
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">
            <div class="mb-2">
                <div class="relative">
                    <svg class="absolute left-6 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#7c7c7c" viewBox="0 0 256 256">
                        <path d="M224,48H32a8,8,0,0,0-8,8V192a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V56A8,8,0,0,0,224,48ZM203.43,64,128,133.15,52.57,64ZM216,192H40V74.19l82.59,75.71a8,8,0,0,0,10.82,0L216,74.19V192Z"></path>
                    </svg>
                    <input type="email" 
                           placeholder="請輸入信箱" 
                           name="email" 
                           class="text-sm w-full py-2 px-4 pl-14 border border-[var(--tertiary-color-300)] rounded-full focus:outline-none transition-colors h-[42px]"
                           value="{{form.email.value|default:''}}">
                </div>
                {% if form.email.errors %}
                    <div class="min-h-[2px]"></div>
                    <div class="text-[var(--red-color-700)] text-sm ml-8 mt-2 min-h-[20px]">
                        {{ form.email.errors.0 }}
                    </div>
                {% endif %}
            </div>
            <div class="mb-2">
                <div class="relative">
                    <svg class="absolute left-6 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#7c7c7c" viewBox="0 0 256 256">
                        <path d="M208,80H176V56a48,48,0,0,0-96,0V80H48A16,16,0,0,0,32,96V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V96A16,16,0,0,0,208,80ZM96,56a32,32,0,0,1,64,0V80H96ZM208,208H48V96H208V208Z"></path>
                    </svg>
                    <input type="password" 
                           placeholder="請輸入密碼" 
                           name="password" 
                           class="text-sm w-full py-2 px-4 pl-14 border border-[var(--tertiary-color-300)] rounded-full focus:outline-none transition-colors h-[42px]"
                           value="{{form.password.value|default:''}}">
                </div>
                {% if form.password.errors %}
                    <div class="min-h-[2px]"></div>
                    <div class="text-[var(--red-color-700)] text-sm ml-8 mt-2 min-h-[20px]">
                        {{ form.password.errors.0 }}
                    </div>
                {% endif %}
            </div>
            <div class="flex items-center space-x-2 ml-2 mt-2">
                <label class="relative w-6 h-6 cursor-pointer flex items-center">
                    <input type="checkbox" 
                           id="remember_me" 
                           name="remember_me" 
                           class="peer absolute opacity-0 w-full h-full cursor-pointer">
                    <svg class="absolute w-6 h-6 transition-opacity fill-[var(--tertiary-color-300)] peer-checked:fill-[var(--main-color)]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
                        <path d="M230,128A102,102,0,1,1,128,26,102.12,102.12,0,0,1,230,128Zm-12,0a90,90,0,1,0-90,90A90.1,90.1,0,0,0,218,128Z"></path>
                    </svg>
                    <svg class="absolute w-6 h-6 opacity-0 peer-checked:opacity-100 transition-opacity fill-[var(--main-color)]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
                        <path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm45.66,85.66-56,56a8,8,0,0,1-11.32,0l-24-24a8,8,0,0,1,11.32-11.32L112,148.69l50.34-50.35a8,8,0,0,1,11.32,11.32Z"></path>
                    </svg>
                </label>
                <label for="remember_me" class="cursor-pointer text-[var(--tertiary-color-500)] text-sm">記住我</label>
            </div>
            <div class="flex justify-center mt-2 sm:mt-6">
                <button class="main-btn">
                    登入
                </button>
            </div>
            <div class="flex justify-center">
                <p class="text-center">尚未擁有帳號？立即 <a href="{% url 'users:new' %}" class="border-b-2">註冊</a></p>
            </div>
        </form>
    </div>
    
    {% include "users/shared/social_login_buttons.html" %}
</div>
{% endblock %}
