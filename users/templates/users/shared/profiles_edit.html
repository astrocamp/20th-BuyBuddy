{% if show %}
    {% include "users/shared/messages.html" %}
{% endif %}

<form hx-post="{% url 'users:profiles_edit' %}"
      hx-target="#user_profile"
      hx-swap="outerHTML"
      enctype="multipart/form-data" id="user_profile">
    {% csrf_token %}
    <div x-data="imagePreview('{{ user_form.instance.avatar_url.url }}')">
        <div class="flex justify-center mb-6">
            <img 
                :src="imageUrl" 
                alt="User Avatar" 
                class="w-40 h-40 rounded-full border-4 border-gray-300 object-contain"
            >
        </div>

    <p>{{user.email}}</p>

    <div class="flex justify-between">
        <span>{{ user_form.avatar_url }}</span>
    </div>

    <div class="flex justify-between">
        <span class="font-semibold">{{ user_form.username.label_tag }}</span>
        <span>{{ user_form.username }}</span>
    </div>
    <button class="border-b-2 cursor-pointer">儲存</button>
</form>
