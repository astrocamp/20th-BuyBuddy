{% if show %}
    {% include "users/shared/messages.html" %}

    <!-- 使用 hx-swap-oob 同時更新導航欄頭像 -->
    <img hx-swap-oob="outerHTML:#navbar-avatar-desktop img" 
        hx-disinherit="oobErrorIgnore"
        src="{{ user_form.instance.avatar_url.url }}" 
        alt="User Avatar">

    <img hx-swap-oob="outerHTML:#navbar-avatar-mobile img" 
        hx-disinherit="oobErrorIgnore"
        src="{{ user_form.instance.avatar_url.url }}" 
        alt="User Avatar">

{% endif %}



<div id="user_profile">
    <div class="flex justify-center mb-6">
        <img 
            src="{{ user_form.instance.avatar_url.url }}" 
            alt="User Avatar" 
            class="w-40 h-40 rounded-full border-4 border-gray-300 object-contain"
        >
    </div>
    <p>{{user.email}}</p>
    <div class="flex justify-between">
        <span class="font-semibold">{{ user_form.username.label_tag }}</span>
        <span>{{ user_form.username.value }}</span>
    </div>
    <button 
        hx-get="{% url 'users:profiles_edit' %}"
        hx-target="#user_profile"
        hx-swap="outerHTML"
        class="border-b-2 cursor-pointer">編輯</button>
</div>
