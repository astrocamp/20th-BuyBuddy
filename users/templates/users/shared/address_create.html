{% if partial_msg_show %}
    {% include "shared/flash_messages_content.html" with messages=messages only %}
{% endif %}

<div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 text-center">
    <form hx-post="{% url 'users:address_create' %}{% if order_id %}?order_id={{order_id}}{% endif %}" 
          hx-target="#modal-container"
          hx-swap="innerHTML"
          method="post" 
          x-data="addressFormControl"
          class="bg-white p-10 sm:p-20 rounded-2xl h-[60%] sm:h-auto sm:max-h-[80%] w-[80%] md:w-[60%] lg:w-[50%] xl:w-[40%] overflow-y-auto" 
          novalidate>
        {% csrf_token %}
        <div class="mb-4">
            {% include "users/shared/address_form_fields.html" %}
        </div>
        <div class="flex gap-4 self-end justify-end">
            <button hx-get="{% url 'users:address_cancel' address_id=0 %}" 
                    hx-target="#modal-container"
                    hx-swap="innerHTML"
                    class="card-btn card-btn-red"
                    type="button">取消</button>
                    
            <button class="card-btn card-btn-secondary">新增</button>
        </div>

        {% if order_id %}
            <input type="hidden" name="order_id" value="{{ order_id }}">
        {% endif %}
    </form>
</div>
