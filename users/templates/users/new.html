{% extends 'layouts/default.html'%}

{% block content%}
<h1>註冊</h1>
<form action="{% url 'users:create' %}" method="post">
    {% csrf_token %}
    <div>
        <label>信箱:</label>
        <input type="email" placeholder="請輸入email" name="email" required class="outline">
    </div>
    <div>
        <label>密碼：</label>
        <input type="password" placeholder="請輸入password" name="password" required class="outline">
    </div>
    <button class="outline cursor-pointer">註冊</button>
</form>
{% endblock %}
